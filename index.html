<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Vercel</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,600;0,900;1,400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #43e97b 0%, #87ceeb 100%);
            font-family: 'Montserrat', sans-serif;
            color: #ffffff;
            padding: 2.5rem;
            text-align: center;
        }

        h1 {
            font-size: clamp(2rem, 8vw, 4.5rem);
            font-weight: 900;
            letter-spacing: -0.02em;
            margin-bottom: 3rem;
            text-shadow: 0 2px 24px rgba(0, 80, 60, 0.18);
        }

        blockquote {
            max-width: 700px;
            font-size: clamp(1rem, 2.5vw, 1.35rem);
            font-weight: 400;
            line-height: 1.75;
            font-style: italic;
            opacity: 0.93;
        }

        blockquote footer {
            margin-top: 1.2rem;
            font-size: 0.88em;
            font-weight: 600;
            font-style: normal;
            opacity: 0.85;
        }
    </style>
</head>
<body>
    <h1>Suntem online: Uraaaa!!!</h1>
    <blockquote>
        „Succesul nu este final, eșecul nu este fatal: curajul de a continua este ceea ce contează."
        <footer>– Winston Churchill</footer>
    </blockquote>
</body>
</html>
